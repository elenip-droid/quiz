<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKG.EDUCATION – AI Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161b2a;
    --blue: #1e8fff;
    --blue2: #0d6fd4;
    --text: #e8eaf0;
    --muted: #7a8299;
    --border: rgba(30,143,255,0.18);
    --correct: #22c97a;
    --wrong: #ff4c6a;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 16px 60px;
    background-image: radial-gradient(ellipse at 60% 0%, rgba(30,143,255,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 10% 80%, rgba(13,111,212,0.07) 0%, transparent 50%);
  }
  .container { width: 100%; max-width: 580px; }

  .logo-bar { display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
  .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: 1px; color: #fff; }
  .logo-text span { color: var(--blue); }

  .screen { display: none; animation: fadeIn 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:none; } }

  .welcome-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    text-align: center;
    box-shadow: 0 0 40px rgba(30,143,255,0.07);
  }
  .welcome-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(30,143,255,0.12); border: 1px solid rgba(30,143,255,0.25);
    border-radius: 20px; padding: 6px 16px;
    font-size: 13px; font-weight: 700; color: var(--blue);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px;
  }
  .welcome-title {
    font-family: 'Rajdhani', sans-serif; font-size: 34px; font-weight: 700;
    line-height: 1.15; margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 40%, var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .welcome-sub { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .prize-box {
    background: rgba(30,143,255,0.07); border: 1px solid rgba(30,143,255,0.2);
    border-radius: 12px; padding: 14px 20px; margin-bottom: 28px;
    font-size: 14px; color: var(--blue); font-weight: 700;
  }
  .prize-box span { color: #fff; font-weight: 800; }
  .section-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-divider hr { flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.07); }
  .section-divider span { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .email-label { text-align: left; font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
  .email-input {
    width: 100%; background: var(--card2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 16px 18px; color: var(--text);
    font-size: 16px; font-family: 'Nunito', sans-serif; outline: none;
    transition: border-color 0.2s; margin-bottom: 8px;
  }
  .email-input:focus { border-color: var(--blue); }
  .email-input::placeholder { color: var(--muted); }
  .email-error { color: var(--wrong); font-size: 12px; font-weight: 700; margin-bottom: 12px; display: none; text-align: left; }
  .btn-start {
    width: 100%; background: linear-gradient(135deg, var(--blue2), var(--blue));
    border: none; border-radius: 14px; padding: 17px; color: #fff;
    font-size: 17px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; letter-spacing: 0.5px; margin-top: 4px;
  }
  .btn-start:active { opacity: 0.88; transform: scale(0.98); }
  .privacy { font-size: 11.5px; color: var(--muted); margin-top: 14px; line-height: 1.7; }
  .privacy strong { color: var(--text); }

  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .q-counter { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .q-counter span { color: var(--blue); }
  .timer-wrap {
    display: flex; align-items: center; gap: 7px;
    background: rgba(30,143,255,0.1); border: 1px solid rgba(30,143,255,0.2);
    border-radius: 20px; padding: 6px 14px;
    font-size: 14px; font-weight: 800; color: var(--blue);
    min-width: 72px; justify-content: center;
  }
  .timer-wrap.urgent { color: var(--wrong); background: rgba(255,76,106,0.1); border-color: rgba(255,76,106,0.3); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity:1; } to { opacity:0.65; } }

  .progress-bar-wrap { height: 5px; background: rgba(255,255,255,0.06); border-radius: 4px; margin-bottom: 22px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue2), var(--blue)); border-radius: 4px; transition: width 0.4s ease; }

  .cat-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 800; letter-spacing: 1.2px;
    text-transform: uppercase; border-radius: 6px; padding: 3px 9px; margin-bottom: 6px;
  }
  .cat-tag.ai   { background: rgba(30,143,255,0.12); color: var(--blue); }
  .cat-tag.code { background: rgba(34,201,122,0.1);  color: var(--correct); }

  .q-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px 22px 20px;
    margin-bottom: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .q-type-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
    background: rgba(255,255,255,0.04); border-radius: 6px;
    padding: 3px 9px; margin-bottom: 12px;
  }
  .q-text { font-size: 18px; font-weight: 700; line-height: 1.5; color: #fff; }

  .options-grid { display: grid; gap: 10px; margin-top: 18px; }
  .opt-btn {
    background: var(--card2); border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 15px 16px; color: var(--text);
    font-size: 15px; font-weight: 600; font-family: 'Nunito', sans-serif;
    cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s;
    display: flex; align-items: center; gap: 12px; line-height: 1.35;
  }
  .opt-btn:active:not(:disabled) { background: rgba(30,143,255,0.1); border-color: var(--blue); }
  .opt-btn.correct { border-color: var(--correct); background: rgba(34,201,122,0.1); color: var(--correct); }
  .opt-btn.wrong   { border-color: var(--wrong);   background: rgba(255,76,106,0.1);  color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }
  .opt-label {
    min-width: 28px; height: 28px; border-radius: 7px;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: var(--muted); flex-shrink: 0;
  }
  .opt-btn.correct .opt-label { background: rgba(34,201,122,0.2); color: var(--correct); }
  .opt-btn.wrong   .opt-label { background: rgba(255,76,106,0.2);  color: var(--wrong); }

  .tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
  .tf-btn {
    border: 1.5px solid rgba(255,255,255,0.07); border-radius: 14px;
    padding: 22px 16px; font-size: 16px; font-weight: 800;
    font-family: 'Nunito', sans-serif; cursor: pointer; text-align: center;
    background: var(--card2); color: var(--text); transition: all 0.15s;
  }
  .tf-btn .tf-icon { font-size: 32px; display: block; margin-bottom: 6px; }
  .tf-btn:active:not(:disabled) { transform: scale(0.97); }
  .tf-btn.correct { border-color: var(--correct); background: rgba(34,201,122,0.1); color: var(--correct); }
  .tf-btn.wrong   { border-color: var(--wrong);   background: rgba(255,76,106,0.1);  color: var(--wrong); }
  .tf-btn:disabled { cursor: default; }

  .logo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
  .logo-cell {
    background: #1a1f2e; border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    min-height: 90px; font-size: 32px;
  }
  .logo-cell:active:not(.disabled) { transform: scale(0.97); }
  .logo-cell .cell-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
  .logo-cell.correct { border-color: var(--correct); background: rgba(34,201,122,0.1); }
  .logo-cell.wrong   { border-color: var(--wrong);   background: rgba(255,76,106,0.1); }
  .logo-cell.disabled { cursor: default; }

  .match-container { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
  .match-row { display: flex; align-items: center; gap: 10px; }
  .match-left {
    flex: 1; background: rgba(30,143,255,0.08); border: 1px solid rgba(30,143,255,0.2);
    border-radius: 10px; padding: 12px 14px;
    font-size: 14px; font-weight: 700; color: var(--blue); text-align: center;
  }
  .match-arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }
  .match-select {
    flex: 1; background: var(--card2); border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px; color: var(--text);
    font-size: 14px; font-weight: 600; font-family: 'Nunito', sans-serif;
    outline: none; cursor: pointer; appearance: none; -webkit-appearance: none;
  }
  .match-select:focus { border-color: var(--blue); }
  .match-select option { background: #1a1f2e; }
  .match-select.correct { border-color: var(--correct); }
  .match-select.wrong   { border-color: var(--wrong); }
  .btn-check {
    width: 100%; background: linear-gradient(135deg, var(--blue2), var(--blue));
    border: none; border-radius: 12px; padding: 15px; color: #fff;
    font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; margin-top: 6px;
  }
  .btn-check:active { opacity: 0.88; }

  .feedback {
    display: none; align-items: flex-start; gap: 10px;
    padding: 13px 16px; border-radius: 10px;
    font-size: 14px; font-weight: 700; margin-top: 14px;
    animation: fadeIn 0.2s ease; line-height: 1.5;
  }
  .feedback.show { display: flex; }
  .feedback.correct-fb { background: rgba(34,201,122,0.1); border: 1px solid rgba(34,201,122,0.3); color: var(--correct); }
  .feedback.wrong-fb   { background: rgba(255,76,106,0.1);  border: 1px solid rgba(255,76,106,0.3);  color: var(--wrong); }

  .btn-next {
    width: 100%; background: transparent; border: 1.5px solid var(--blue);
    border-radius: 12px; padding: 15px; color: var(--blue);
    font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; margin-top: 10px; transition: background 0.15s, color 0.15s; display: none;
  }
  .btn-next.show { display: block; }
  .btn-next:active { background: var(--blue); color: #fff; }

  .results-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 32px; text-align: center;
    box-shadow: 0 0 60px rgba(30,143,255,0.1);
  }
  .score-ring {
    width: 120px; height: 120px; border-radius: 50%;
    background: conic-gradient(var(--blue) var(--pct,0%), rgba(255,255,255,0.05) 0);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 22px; position: relative;
  }
  .score-ring::before {
    content: ''; width: 88px; height: 88px; border-radius: 50%;
    background: var(--card); position: absolute;
  }
  .score-num { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; color: #fff; position: relative; z-index: 1; }
  .results-title {
    font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700;
    background: linear-gradient(135deg, #fff 40%, var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
